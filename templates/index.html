<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>GIGA HUB | الرئيسية</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020205; color: white; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); }
        .grad-text { 
            background: linear-gradient(135deg, #fff 30%, #6366f1 100%); 
            -webkit-background-clip: text; background-clip: text; 
            color: transparent; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen">
    <nav class="fixed top-0 w-full z-50 glass py-4 px-10 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <img src="{{ url_for('static', filename='logo.png') }}" class="w-10 h-10 object-contain rounded-lg shadow-lg shadow-indigo-500/20">
            <span class="text-2xl font-black grad-text uppercase tracking-tighter">GIGA HUB</span>
        </div>
        <form action="/" method="GET" class="hidden md:flex relative w-1/3">
            <input type="text" name="search" placeholder="ابحث عن التطبيقات..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-2 px-10 outline-none focus:border-indigo-500 transition">
            <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-500 w-5 h-5"></i>
        </form>
        <div class="flex gap-4">
            <a href="/login" class="p-2 glass rounded-xl hover:bg-white/10 transition"><i data-lucide="shield-check"></i></a>
        </div>
    </nav>

    <header class="pt-44 pb-16 text-center px-6">
        <h1 class="text-6xl md:text-8xl font-black grad-text mb-6">مستقبل التحميل.</h1>
        <p class="text-gray-400 text-xl mb-10 max-w-2xl mx-auto">أقوى البرامج والألعاب المفحوصة أمنياً لعام 2026 بين يديك الآن.</p>
        <div class="flex justify-center gap-4 overflow-x-auto pb-4">
            <a href="/" class="px-8 py-3 rounded-full glass hover:bg-indigo-600 transition font-bold">الكل</a>
            <a href="/?category=Apps" class="px-8 py-3 rounded-full glass hover:bg-indigo-600 transition font-bold">تطبيقات</a>
            <a href="/?category=Games" class="px-8 py-3 rounded-full glass hover:bg-indigo-600 transition font-bold">ألعاب</a>
            <a href="/?category=AI" class="px-8 py-3 rounded-full glass hover:bg-indigo-600 transition font-bold">AI</a>
        </div>
    </header>

    <main class="container mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            {% for app in apps %}
            <div class="glass p-8 rounded-[3rem] group hover:scale-[1.02] transition-all duration-500 border border-white/5 hover:border-indigo-500/50 shadow-2xl shadow-black">
                <div class="relative h-64 rounded-[2rem] overflow-hidden mb-8">
                    <img src="{{ app.image_url }}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    <span class="absolute top-4 left-4 bg-indigo-600 px-4 py-1 rounded-full text-[10px] font-bold shadow-lg uppercase tracking-widest">{{ app.badge }}</span>
                </div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-3xl font-black">{{ app.name }}</h3>
                    <span class="text-xs text-indigo-400 font-bold bg-indigo-400/10 px-3 py-1 rounded-lg">{{ app.version }}</span>
                </div>
                <p class="text-gray-500 text-sm mb-10 h-10 overflow-hidden">{{ app.tagline }}</p>
                <a href="/app/{{ app.id }}" class="block w-full text-center bg-white text-black py-5 rounded-[2rem] font-black text-xl hover:bg-indigo-600 hover:text-white transition-all duration-500 shadow-xl shadow-white/5">تنزيل مباشر</a>
            </div>
            {% endfor %}
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
