<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>GIGA HUB | الإدارة</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020205; color: white; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); }
        input, textarea, select { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus { border-color: #6366f1 !important; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <img src="{{ url_for('static', filename='logo.png') }}" class="w-12 h-12">
                <h1 class="text-3xl font-black uppercase tracking-widest">إدارة المنصة</h1>
            </div>
            <a href="/" class="px-6 py-2 glass rounded-xl hover:bg-red-500/20 text-red-400 transition">خروج</a>
        </div>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-[2.5rem] sticky top-10">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="plus-circle"></i> إضافة برنامج جديد</h2>
                    <form action="/add" method="POST" class="space-y-4">
                        <input type="text" name="name" placeholder="اسم البرنامج (مثلاً: Photoshop)" class="w-full p-4 rounded-xl outline-none" required>
                        <select name="category" class="w-full p-4 rounded-xl outline-none">
                            <option value="Apps">تطبيقات</option>
                            <option value="Games">ألعاب</option>
                            <option value="AI">ذكاء اصطناعي</option>
                        </select>
                        <input type="text" name="tagline" placeholder="وصف قصير جذاب" class="w-full p-4 rounded-xl outline-none">
                        <textarea name="description" placeholder="الوصف التفصيلي للبرنامج..." rows="4" class="w-full p-4 rounded-xl outline-none"></textarea>
                        <input type="text" name="image_url" placeholder="رابط الصورة المباشر (PostImages)" class="w-full p-4 rounded-xl outline-none">
                        <input type="text" name="download_link" placeholder="رابط التحميل" class="w-full p-4 rounded-xl outline-none" required>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" name="badge" placeholder="الوسم (NEW)">
                            <input type="text" name="version" placeholder="الإصدار (v2026)">
                        </div>
                        <input type="text" name="file_size" placeholder="الحجم (مثال: 1.2 GB)">
                        <button class="w-full bg-indigo-600 py-4 rounded-xl font-black hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/20">نشر البرنامج الآن</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="text-xl font-bold mb-8 flex items-center gap-2"><i data-lucide="list"></i> البرامج المنشورة ({{ apps|length }})</h2>
                    <div class="space-y-4">
                        {% for app in apps %}
                        <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5 hover:border-white/10 transition">
                            <div class="flex items-center gap-4">
                                <img src="{{ app.image_url }}" class="w-12 h-12 rounded-lg object-cover">
                                <div>
                                    <h4 class="font-bold">{{ app.name }}</h4>
                                    <p class="text-xs text-gray-500">{{ app.category }} | {{ app.downloads }} تحميل</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <a href="/app/{{ app.id }}" target="_blank" class="p-2 text-indigo-400 hover:bg-indigo-400/10 rounded-lg transition"><i data-lucide="eye"></i></a>
                                <a href="/delete/{{ app.id }}" onclick="return confirm('هل أنت متأكد من الحذف؟')" class="p-2 text-red-400 hover:bg-red-400/10 rounded-lg transition"><i data-lucide="trash-2"></i></a>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
